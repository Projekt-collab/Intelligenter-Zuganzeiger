{% extends "basis.html" %}

{% block title %} Lockfuehrer {% endblock %}

{% block content %}
<!-- Die Lockkabine -->
<div class="w-full h-[65vh] min-h-[400px] bg-slate-900 rounded-xl overflow-hidden shadow-2xl border-4 border-slate-700 flex flex-col">

    <div class="relative flex-1 w-full overflow-hidden border-b-8 border-slate-800">
        <!-- der Himmel und die Erde -->
        <div class="absolute inset-0 bg-gradient-to-b from-sky-400 via-sky-200 to-transparent z-0"></div>
        <div class="absolute bottom-0 w-full h-[45%] bg-gradient-to-b from-slate-500 via-slate-600 to-slate-700 z-0"></div>

        <svg class="absolute bottom-0 left-0 w-full h-[45%] z-10" viewBox="0 0 1000 100" preserveAspectRatio="none">
            <path d="M 350,100 L 650,100 L 638,82 L 362,82 Z" fill="#2d3748"></path>
            <path d="M 380,70  L 620,70  L 610,58 L 390,58 Z" fill="#334155" opacity="0.9"></path>

            <!-- Abzweigung -->
            <path d="M 400,48  L 600,48  L 593,38 L 407,38 Z" fill="#334155" opacity="0.8"></path>

            <!-- Links -->
            <path d="M 180,12 L 230,12 L 232,4 L 182,4 Z" fill="#475569" opacity="0.6"></path>
            <!-- Centrum -->
            <path d="M 475,12 L 525,12 L 522,4 L 478,4 Z" fill="#475569" opacity="0.6"></path>
            <!-- Rechts -->
            <path d="M 770,12 L 820,12 L 818,4 L 768,4 Z" fill="#475569" opacity="0.6"></path>

            <!-- 1. Gerade Weg -->
            <path d="M 380 100 L 420 50 L 480 0" fill="none" stroke="#e2e8f0" stroke-width="3" opacity="0.8"></path>
            <path d="M 620 100 L 580 50 L 520 0" fill="none" stroke="#e2e8f0" stroke-width="3" opacity="0.8"></path>

            <!-- 2. Links Weg -->
            <path d="M 380 100 L 420 50 Q 380 35, 180 0" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"></path>
            <path d="M 620 100 L 580 50 Q 440 42, 230 0" fill="none" stroke="#cbd5e1" stroke-width="3" opacity="0.85"></path>

            <!-- 3. Rechts Weg -->
            <path d="M 380 100 L 420 50 Q 560 42, 770 0" fill="none" stroke="#cbd5e1" stroke-width="3" opacity="0.85"></path>
            <path d="M 620 100 L 580 50 Q 620 35, 820 0" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"></path>

            <path d="M 450 44 L 465 44 L 460 50 Z" fill="#94a3b8" opacity="0.9"></path>
            <path d="M 550 44 L 535 44 L 540 50 Z" fill="#94a3b8" opacity="0.9"></path>
        </svg>

        <!-- Ampel -->
        <div class="absolute top-[15%] right-[12%] w-8 h-24 bg-neutral-950 border-2 border-neutral-700 rounded-md flex flex-col justify-around items-center py-1 shadow-lg z-20">
            <div id="light-red" class="w-5 h-5 rounded-full bg-red-500 shadow-[0_0_12px_#ef4444] border border-red-400/50"></div>
            <div id="light-yellow" class="w-5 h-5 rounded-full bg-amber-950/70 border border-amber-900/30"></div>
            <div id="light-green" class="w-5 h-5 rounded-full bg-emerald-950/70 border border-emerald-900/30"></div>
            <div class="absolute -bottom-8 left-1/2 -translate-x-1/2 w-2 h-8 bg-neutral-950"></div>
        </div>

        <!-- Lichtfleck -->
        <div class="absolute inset-0 bg-gradient-to-tr from-white/5 via-white/10 to-transparent pointer-events-none z-20"></div>
    </div>

    <!-- Dashboard -->
    <div class="flex-1 w-full bg-gradient-to-b from-slate-800 to-slate-950 border-t-4 border-red-600 shadow-[inset_0_10px_20px_rgba(0,0,0,0.6)] flex justify-between items-center px-6 py-4 gap-4">

        <!-- Bildschirm 1 -->
        <div class="w-[33%] h-full bg-neutral-900 border-4 border-slate-700 rounded-lg p-2 shadow-inner relative flex items-center justify-center">
            <div class="w-full h-full bg-[#002b36] rounded border border-cyan-900 p-2 font-mono text-cyan-400 text-xs sm:text-sm overflow-hidden select-none">
                <p class="text-emerald-400 font-bold mb-1">▶ SYSTEM OK</p>
                <p>LOCKFÜHRERNAME: {{ user.username }}</p>
                <p>ZUGINFO: {{ aktuelle_fahrt }}</p>
            </div>
        </div>

        <!-- Bildschirm 2 -->
        <div class="w-[33%] h-full bg-neutral-900 border-4 border-slate-700 rounded-lg p-2 shadow-inner relative flex items-center justify-center">
            <div class="w-full h-full bg-[#002b36] rounded border border-cyan-900 p-2 font-mono text-cyan-400 text-xs sm:text-sm overflow-hidden select-none">
                <p class="text-amber-400 font-bold mb-1">⚡ Nachrichten</p>
                <div id="monitor-2">

                </div>
            </div>
        </div>

        <!-- Bedienfeld -->
        <div class="w-[30%] h-full flex items-center justify-around gap-2">
            <button id="fahren-btn" class="w-12 h-12 sm:w-16 sm:h-16 rounded-full bg-emerald-600 border-4 border-neutral-900 text-[9px] sm:text-xs font-bold text-white uppercase tracking-wider text-center flex items-center justify-center p-1">Fahren</button>
            <button id="gleis-anfrage-btn" class="w-12 h-12 sm:w-16 sm:h-16 rounded-full bg-amber-600 border-4 border-neutral-900 text-[8px] sm:text-[10px] font-bold text-white uppercase tracking-wider text-center flex items-center justify-center p-1">Gleis<br>anfr.</button>
            {% if aktuelle_fahrt %}
                <form method="POST" action="{% url 'fahrt_beenden' aktuelle_fahrt.id %}">
                    {% csrf_token %}
                        <button type="submit" class="w-full sm:w-auto justify-center inline-flex items-center bg-red-600 hover:bg-red-700 text-white font-medium py-2.5 px-5 rounded-lg shadow-sm transition cursor-pointer">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            Fahrt beenden
                        </button>
                </form>
            {% endif %}
        </div>
    </div>
</div>
    <script>
    // 1. WebSocket-Verbindung aufbauen
    const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
    const stellwerkSocket = new WebSocket(
        wsScheme + '://' + window.location.host + '/ws/stellwerk/'
    );

    // Wenn der Server eine Nachricht schickt (z.B. Gleis zugewiesen oder "Warten")
    stellwerkSocket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        console.log("Nachricht vom Stellwerk:", data);

        if (data.status === 'befehl' && data.message === 'redirect_to_dashboard') {
            console.log("Fahrt beendet. Redirection...");
            window.location.href = "{% url 'dashboard' %}";
        }

        if (data.status === 'update') {
            const container = document.getElementById('monitor-2');
            const p = document.createElement('p');
            p.textContent = data.message;
            container.prepend(p);

            const redLight = document.getElementById('light-red');
            const yellowLight = document.getElementById('light-yellow');
            const greenLight = document.getElementById('light-green');

            if (!greenLight.classList.contains('bg-emerald-500')) {
                redLight.className = "w-5 h-5 rounded-full bg-red-950/70 border-red-900/30";
                yellowLight.className = "w-5 h-5 rounded-full bg-amber-500 shadow-[0_0_12px_#f59e0b] border-amber-400/50";
                setTimeout(() => {
                    yellowLight.className = "w-5 h-5 rounded-full bg-amber-950/70 border border-amber-900/30";
                    greenLight.className = "w-5 h-5 rounded-full bg-emerald-500 shadow-[0_0_12px_#10b981] border-emerald-400/50"
                    console.log("2 sek warten");
                }, 2000);
            }

        }
    };

    stellwerkSocket.onclose = function(e) {
        console.error('Stellwerk-Socket wurde unerwartet geschlossen.');
    };

    // 2. Event-Listener für den Button-Klick
    document.getElementById('gleis-anfrage-btn').onclick = function(e) {
        stellwerkSocket.send(JSON.stringify({
            'type': 'einfahrt_anfrage'
        }));
        console.log("Einfahrt-Anfrage an das Stellwerk gesendet.");
    };
    document.getElementById('fahren-btn').onclick = function(e) {
        stellwerkSocket.send(JSON.stringify({
            'type': 'zug_faehrt_los'
        }));
        console.log("Zug fährt in das zugewiesene Gleis ein.");
    };
</script>
{% endblock %}
